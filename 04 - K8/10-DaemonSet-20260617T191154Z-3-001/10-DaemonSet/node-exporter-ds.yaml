apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  labels:
    app: prometheus
    component: node-exporter
spec:
  selector:
    matchLabels:
      app: prometheus
      component: node-exporter
  
  template:
    metadata:
      labels:
        app: prometheus
        component: node-exporter
    spec:
      # These tolerations allow the DaemonSet to run on control plane/master nodes
      tolerations:
      - key: node-role.kubernetes.io/TODO
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
        
      hostPID: true # Required to see all host processes
      hostIPC: true
      hostNetwork: true # Must use the host's network namespace
      containers:
      - name: node-exporter
        image: prom/node-exporter:latest
        ports:
        - containerPort: 9100 # Default port for Node Exporter
          hostPort: 9100     # Expose it directly on the host node's port 9100
          name: metrics
        
        # Mount the host filesystem to collect detailed disk/fs metrics
        volumeMounts:
        - name: rootfs
          mountPath: /host/root
          readOnly: true
        
        # Arguments tell the exporter where to find the mounted root
        args:
        - --path.rootfs=/host/root
      
      # Define the host volume
      volumes:
      - name: rootfs
        hostPath:
          path: /
