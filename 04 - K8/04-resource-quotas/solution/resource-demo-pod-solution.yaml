apiVersion: v1
kind: Pod
metadata:
  name: resource-demo-pod
  labels:
    app: stress
spec:
  # Never: This ensures the Pod does not enter a CrashLoopBackOff state 
  # after the OOM-Killed event.
  restartPolicy: Never
  containers:
  - name: memory-stress-container
    image: polinux/stress
    resources:
      requests:
        memory: "50Mi"
        cpu: "100m"
      limits:
        memory: "100Mi"
        cpu: "200m"
    
    # --- The Stress Command ---
    # The 'stress' utility is used here to allocate memory.
    command: ["stress"]
    args: 
      # --vm 1: Run 1 memory stress worker
      # --vm-bytes 300M: Attempt to allocate 300MB of virtual memory 
      #                  (This is > 200Mi limit, which will cause the OOM-Kill)
      # --timeout 30s: Stop the stress test after 30 seconds
      ["--vm", "1", "--vm-bytes", "300M", "--timeout", "30s"]